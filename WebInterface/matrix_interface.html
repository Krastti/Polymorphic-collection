<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матричный Калькулятор - Вариант 12</title>
    <!-- Тип элементов: будет заменен при загрузке -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        h2 {
            color: #667eea;
            margin: 20px 0 15px 0;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .matrix-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .matrix-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e9ecef;
        }
        .matrix-input {
            display: grid;
            gap: 5px;
            margin: 15px 0;
        }
        .matrix-input input {
            width: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
        }
        .matrix-input input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.3);
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; transform: translateY(-2px); }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; transform: translateY(-2px); }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; transform: translateY(-2px); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; transform: translateY(-2px); }
        .btn-info { background: #17a2b8; color: white; }
        .btn-info:hover { background: #138496; transform: translateY(-2px); }
        .operations {
            background: #e9ecef;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .operations-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .result-section {
            background: #d4edda;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #c3e6cb;
        }
        .result-matrix {
            display: grid;
            gap: 5px;
            margin: 15px 0;
            justify-content: center;
        }
        .result-matrix span {
            padding: 10px 15px;
            background: white;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }
        .size-input {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }
        .size-input input {
            width: 80px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .scalar-input {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 15px 0;
        }
        .scalar-input input {
            width: 120px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .hidden { display: none; }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            border: 1px solid #f5c6cb;
        }
        .info-message {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            border: 1px solid #bee5eb;
        }
        @media (max-width: 900px) {
            .matrix-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧮 Матричный Калькулятор</h1>
    <p class="subtitle" id="element-type">Тип элементов: <strong>Загрузка...</strong></p>

    <div id="message-container"></div>

    <h2>⚙️ Настройки</h2>
    <div class="size-input">
        <label>Размер матрицы (N×N):</label>
        <input type="number" id="matrix-size" min="1" max="10" value="2">
        <button class="btn btn-primary" onclick="onSetSize()">Применить размер</button>
    </div>

    <div class="matrix-section">
        <div class="matrix-panel">
            <h3>Матрица A</h3>
            <div id="A-input-container" class="matrix-input"></div>
            <button class="btn btn-success" onclick="onCreateMatrixA()">Создать матрицу A</button>
        </div>

        <div class="matrix-panel">
            <h3>Матрица B</h3>
            <div id="B-input-container" class="matrix-input"></div>
            <button class="btn btn-success" onclick="onCreateMatrixB()">Создать матрицу B</button>
        </div>
    </div>

    <div class="operations">
        <h2>🔢 Операции</h2>
        <div class="operations-buttons">
            <button class="btn btn-info" onclick="onAdd()">A + B (Сложение)</button>
            <button class="btn btn-info" onclick="onMultiply()">A × B (Умножение)</button>
            <button class="btn btn-info" onclick="onLUDecompose()">🔢 LU-Разложение</button>
        </div>

        <h3 style="margin-top: 20px;">Умножение на скаляр</h3>
        <div class="scalar-input">
            <label>Скаляр (Re):</label>
            <input type="number" id="scalar-real" step="0.01" value="1">
            <span id="scalar-imag-container" class="hidden">
                    <label>Скаляр (Im):</label>
                    <input type="number" id="scalar-imag" step="0.01" value="0">
                </span>
            <button class="btn btn-warning" onclick="onScalarMultiply()">A × scalar</button>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn btn-danger" onclick="onReset()">🗑️ Сбросить всё</button>
        </div>
    </div>

    <div id="result-section" class="result-section hidden">
        <h2>📊 Результат</h2>
        <div id="result-container"></div>
    </div>

    <div style="margin-top: 30px; text-align: center; color: #666;">
        <p>Вариант 12: Матричное сложение, умножение, умножение на скаляр</p>
    </div>
</div>

<script>
    let matrixA = null;
    let matrixB = null;
    let matrixSize = 2;

    class Matrix {
        constructor(size) {
            this.size = size;
            this.data = [];
            for (let i = 0; i < size; i++) {
                this.data[i] = [];
                for (let j = 0; j < size; j++) {
                    this.data[i][j] = IS_COMPLEX ? new Complex(0, 0) : 0;
                }
            }
        }

        set(row, col, value) {
            this.data[row][col] = value;
        }

        get(row, col) {
            return this.data[row][col];
        }

        clone() {
            const cloned = new Matrix(this.size);
            for (let i = 0; i < this.size; i++) {
                for (let j = 0; j < this.size; j++) {
                    if (IS_COMPLEX) {
                        cloned.data[i][j] = this.data[i][j].clone();
                    } else {
                        cloned.data[i][j] = this.data[i][j];
                    }
                }
            }
            return cloned;
        }

        add(other) {
            if (this.size !== other.size) {
                throw new Error('Размеры матриц не совпадают');
            }
            const result = new Matrix(this.size);
            for (let i = 0; i < this.size; i++) {
                for (let j = 0; j < this.size; j++) {
                    if (IS_COMPLEX) {
                        result.data[i][j] = this.data[i][j].add(other.data[i][j]);
                    } else {
                        result.data[i][j] = this.data[i][j] + other.data[i][j];
                    }
                }
            }
            return result;
        }

        multiply(other) {
            if (this.size !== other.size) {
                throw new Error('Размеры матриц не совпадают');
            }
            const result = new Matrix(this.size);
            for (let i = 0; i < this.size; i++) {
                for (let j = 0; j < this.size; j++) {
                    let sum = IS_COMPLEX ? new Complex(0, 0) : 0;
                    for (let k = 0; k < this.size; k++) {
                        const product = IS_COMPLEX
                            ? this.data[i][k].multiply(other.data[k][j])
                            : this.data[i][k] * other.data[k][j];
                        if (IS_COMPLEX) {
                            sum = sum.add(product);
                        } else {
                            sum += product;
                        }
                    }
                    result.data[i][j] = sum;
                }
            }
            return result;
        }

        multiplyScalar(scalar) {
            const result = new Matrix(this.size);
            for (let i = 0; i < this.size; i++) {
                for (let j = 0; j < this.size; j++) {
                    result.data[i][j] = this.data[i][j] * scalar;
                }
            }
            return result;
        }

        luDecompose() {
            if (this.size === 0) {
                return { success: false, error: 'Размер матрицы равен 0', L: null, U: null };
            }

            const n = this.size;
            const L = new Matrix(n);
            const U = new Matrix(n);

            // Инициализация L (единицы на диагонали) и U (нули)
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (IS_COMPLEX) {
                        if (i === j) {
                            L.set(i, j, new Complex(1, 0));
                        } else {
                            L.set(i, j, new Complex(0, 0));
                        }
                        U.set(i, j, new Complex(0, 0));
                    } else {
                        if (i === j) {
                            L.set(i, j, 1);
                        } else {
                            L.set(i, j, 0);
                        }
                        U.set(i, j, 0);
                    }
                }
            }

            // Основной цикл разложения
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    let sum = IS_COMPLEX ? new Complex(0, 0) : 0;

                    // Вычисление суммы произведений
                    for (let k = 0; k < i; k++) {
                        const l_ik = L.get(i, k);
                        const u_kj = U.get(k, j);
                        const product = IS_COMPLEX
                            ? l_ik.multiply(u_kj)
                            : l_ik * u_kj;

                        if (IS_COMPLEX) {
                            sum = sum.add(product);
                        } else {
                            sum += product;
                        }
                    }

                    const a_ij = this.get(i, j);

                    // sum = a_ij - sum
                    if (IS_COMPLEX) {
                        sum = a_ij.subtract(sum);
                    } else {
                        sum = a_ij - sum;
                    }

                    if (j >= i) {
                        U.set(i, j, sum);
                    } else {
                        const u_jj = U.get(j, j);

                        // Проверка на ноль на диагонали
                        if (IS_COMPLEX) {
                            if (u_jj.isZero()) {
                                return {
                                    success: false,
                                    error: `Сингулярная матрица: ноль на диагонали U[${j}][${j}]`,
                                    L: null,
                                    U: null
                                };
                            }
                            const divResult = sum.divide(u_jj);
                            if (divResult === null) {
                                return {
                                    success: false,
                                    error: 'Ошибка деления при вычислении L',
                                    L: null,
                                    U: null
                                };
                            }
                            L.set(i, j, divResult);
                        } else {
                            if (Math.abs(u_jj) < 1e-10) {
                                return {
                                    success: false,
                                    error: `Сингулярная матрица: ноль на диагонали U[${j}][${j}]`,
                                    L: null,
                                    U: null
                                };
                            }
                            L.set(i, j, sum / u_jj);
                        }
                    }
                }
            }

            return { success: true, error: null, L: L, U: U };
        }
    }

    // ============================================
    // Функции интерфейса
    // ============================================

    function createMatrixInputs(matrixName, size) {
        const container = document.getElementById(`${matrixName}-input-container`);
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                const inputGroup = document.createElement('div');
                inputGroup.style.textAlign = 'center';

                if (IS_COMPLEX) {
                    const realInput = document.createElement('input');
                    realInput.type = 'number';
                    realInput.step = '0.01';
                    realInput.value = '0';
                    realInput.id = `${matrixName}-${i}-${j}-real`;
                    realInput.placeholder = 'Re';

                    const imagInput = document.createElement('input');
                    imagInput.type = 'number';
                    imagInput.step = '0.01';
                    imagInput.value = '0';
                    imagInput.id = `${matrixName}-${i}-${j}-imag`;
                    imagInput.placeholder = 'Im';

                    inputGroup.appendChild(realInput);
                    inputGroup.appendChild(imagInput);
                } else {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.step = '0.01';
                    input.value = '0';
                    input.id = `${matrixName}-${i}-${j}`;
                    inputGroup.appendChild(input);
                }
                container.appendChild(inputGroup);
            }
        }
    }

    function readMatrixFromInputs(matrixName, size) {
        const matrix = new Matrix(size);

        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (IS_COMPLEX) {
                    const real = parseFloat(document.getElementById(`${matrixName}-${i}-${j}-real`).value) || 0;
                    const imag = parseFloat(document.getElementById(`${matrixName}-${i}-${j}-imag`).value) || 0;
                    matrix.set(i, j, new Complex(real, imag));
                } else {
                    const value = parseFloat(document.getElementById(`${matrixName}-${i}-${j}`).value) || 0;
                    matrix.set(i, j, value);
                }
            }
        }

        return matrix;
    }

    function displayResult(matrix, title) {
        const container = document.getElementById('result-container');
        container.innerHTML = '';

        const titleElem = document.createElement('h3');
        titleElem.textContent = title;
        container.appendChild(titleElem);

        const matrixDiv = document.createElement('div');
        matrixDiv.className = 'result-matrix';
        matrixDiv.style.gridTemplateColumns = `repeat(${matrix.size}, 1fr)`;

        for (let i = 0; i < matrix.size; i++) {
            for (let j = 0; j < matrix.size; j++) {
                const span = document.createElement('span');
                const value = matrix.get(i, j);
                span.textContent = IS_COMPLEX ? value.toString() : value.toFixed(2);
                matrixDiv.appendChild(span);
            }
        }

        container.appendChild(matrixDiv);
        document.getElementById('result-section').classList.remove('hidden');
    }

    function displayLUResults(L, U, LU, verification) {
        const container = document.getElementById('result-container');
        container.innerHTML = '';

        // Матрица L
        const titleL = document.createElement('h3');
        titleL.textContent = '📐 Матрица L (нижняя треугольная)';
        titleL.style.color = '#667eea';
        container.appendChild(titleL);

        const matrixL = document.createElement('div');
        matrixL.className = 'result-matrix';
        matrixL.style.gridTemplateColumns = `repeat(${L.size}, 1fr)`;
        for (let i = 0; i < L.size; i++) {
            for (let j = 0; j < L.size; j++) {
                const span = document.createElement('span');
                const value = L.get(i, j);
                span.textContent = IS_COMPLEX ? value.toString() : value.toFixed(2);
                span.style.background = i >= j ? '#e8f4fd' : '#f8f9fa';
                matrixL.appendChild(span);
            }
        }
        container.appendChild(matrixL);

        // Матрица U
        const titleU = document.createElement('h3');
        titleU.textContent = '📐 Матрица U (верхняя треугольная)';
        titleU.style.color = '#667eea';
        container.appendChild(titleU);

        const matrixU = document.createElement('div');
        matrixU.className = 'result-matrix';
        matrixU.style.gridTemplateColumns = `repeat(${U.size}, 1fr)`;
        for (let i = 0; i < U.size; i++) {
            for (let j = 0; j < U.size; j++) {
                const span = document.createElement('span');
                const value = U.get(i, j);
                span.textContent = IS_COMPLEX ? value.toString() : value.toFixed(2);
                span.style.background = i <= j ? '#e8f4fd' : '#f8f9fa';
                matrixU.appendChild(span);
            }
        }
        container.appendChild(matrixU);

        document.getElementById('result-section').classList.remove('hidden');
    }

    function showError(message) {
        const container = document.getElementById('message-container');
        container.innerHTML = `<div class="error-message">${message}</div>`;
        setTimeout(() => container.innerHTML = '', 5000);
    }

    function showInfo(message) {
        const container = document.getElementById('message-container');
        container.innerHTML = `<div class="info-message">${message}</div>`;
        setTimeout(() => container.innerHTML = '', 5000);
    }

    // ============================================
    // Обработчики событий
    // ============================================

    function onSetSize() {
        const size = parseInt(document.getElementById('matrix-size').value);
        if (size < 1 || size > 10) {
            showError('Размер матрицы должен быть от 1 до 10');
            return;
        }
        matrixSize = size;
        createMatrixInputs('A', size);
        createMatrixInputs('B', size);
        matrixA = null;
        matrixB = null;
        showInfo(`Размер матриц установлен: ${size}x${size}`);
    }

    function onCreateMatrixA() {
        matrixA = readMatrixFromInputs('A', matrixSize);
        showInfo('Матрица A создана');
    }

    function onCreateMatrixB() {
        matrixB = readMatrixFromInputs('B', matrixSize);
        showInfo('Матрица B создана');
    }

    function onAdd() {
        if (!matrixA || !matrixB) {
            showError('Сначала создайте обе матрицы');
            return;
        }
        try {
            const result = matrixA.add(matrixB);
            displayResult(result, 'Результат: C = A + B');
            showInfo('Сложение выполнено успешно');
        } catch (e) {
            showError(e.message);
        }
    }

    function onMultiply() {
        if (!matrixA || !matrixB) {
            showError('Сначала создайте обе матрицы');
            return;
        }
        try {
            const result = matrixA.multiply(matrixB);
            displayResult(result, 'Результат: C = A × B');
            showInfo('Умножение выполнено успешно');
        } catch (e) {
            showError(e.message);
        }
    }

    function onScalarMultiply() {
        if (!matrixA) {
            showError('Сначала создайте матрицу A');
            return;
        }
        let scalar;

        scalar = parseFloat(document.getElementById('scalar-real').value) || 0;

        try {
            const result = matrixA.multiplyScalar(scalar);
            displayResult(result, 'Результат: C = A × scalar');
            showInfo('Умножение на скаляр выполнено успешно');
        } catch (e) {
            showError(e.message);
        }
    }

    // ============================================
    // Обработчик LU-разложения
    // ============================================

    function onLUDecompose() {
        if (!matrixA) {
            showError('Сначала создайте матрицу A');
            return;
        }

        showInfo('Выполнение LU-разложения...');

        const result = matrixA.luDecompose();

        if (!result.success) {
            showError(`❌ Ошибка LU-разложения: ${result.error}`);
        }
    }

    function onReset() {
        matrixA = null;
        matrixB = null;
        document.getElementById('result-section').classList.add('hidden');
        document.getElementById('message-container').innerHTML = '';
        showInfo('Память сброшена');
    }

    // ============================================
    // Инициализация при загрузке
    // ============================================

    window.onload = function() {
        // Читаем тип элемента из URL параметров
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');

        if (typeParam === '2') {
            ELEMENT_TYPE = 2;
            IS_COMPLEX = true;
            document.getElementById('element-type').innerHTML = 'Тип элементов: <strong>Комплексные числа</strong>';
        } else {
            ELEMENT_TYPE = 1;
            IS_COMPLEX = false;
            document.getElementById('element-type').innerHTML = 'Тип элементов: <strong>Вещественные числа</strong>';
        }

        document.getElementById('matrix-size').value = matrixSize;
        createMatrixInputs('A', matrixSize);
        createMatrixInputs('B', matrixSize);

        if (IS_COMPLEX) {
            document.getElementById('scalar-imag-container').classList.remove('hidden');
        }

        showInfo('Веб-интерфейс готов к работе. Тип элементов: ' + (IS_COMPLEX ? 'Комплексные' : 'Вещественные'));
    };
</script>
</body>
</html>
