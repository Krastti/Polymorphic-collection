<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matrix Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="bg-glow"></div>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⟨M⟩</span>
        <span class="logo-text">Matrix<span class="logo-accent">Calc</span></span>
      </div>
      <div class="header-badge" id="health-badge">
        <span class="dot"></span> Сервер запускается…
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Settings -->
    <section class="card settings-card">
      <div class="card-label">Параметры</div>
      <div class="settings-row">
        <div class="field">
          <label class="field-label">Тип элементов</label>
          <div class="select-wrap">
            <select id="type">
              <option value="double">Вещественные (double)</option>
              <option value="complex">Комплексные (complex)</option>
            </select>
            <span class="select-arrow">▾</span>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Размер матрицы (n×n)</label>
          <div class="size-control">
            <button class="size-btn" id="dec">−</button>
            <span id="size-display">2</span>
            <button class="size-btn" id="inc">+</button>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-resize">Применить</button>
      </div>
    </section>

    <!-- Matrices -->
    <section class="card matrices-card">
      <div class="matrices-grid">
        <div class="matrix-panel">
          <div class="panel-header">
            <span class="panel-title">Матрица <em>A</em></span>
          </div>
          <div id="matrix-a" class="matrix-grid"></div>
        </div>

        <div class="matrix-divider">
          <div class="op-symbol" id="op-symbol">+</div>
        </div>

        <div class="matrix-panel" id="panel-b">
          <div class="panel-header">
            <span class="panel-title">Матрица <em>B</em></span>
            <span class="panel-hint">не нужна для LU</span>
          </div>
          <div id="matrix-b" class="matrix-grid"></div>
        </div>

        <div class="matrix-panel scalar-panel" id="panel-scalar">
          <div class="panel-header">
            <span class="panel-title">Скаляр</span>
          </div>
          <div id="scalar-input" class="scalar-area"></div>
        </div>
      </div>
    </section>

    <!-- Operations -->
    <section class="card ops-card">
      <div class="card-label">Операция</div>
      <div class="ops-row">
        <button class="op-btn active" data-op="sum">
          <span class="op-icon">＋</span>
          <span>Сложение</span>
          <span class="op-formula">A + B</span>
        </button>
        <button class="op-btn" data-op="multiply">
          <span class="op-icon">×</span>
          <span>Умножение</span>
          <span class="op-formula">A × B</span>
        </button>
        <button class="op-btn" data-op="scalar_multiply">
          <span class="op-icon">λ</span>
          <span>Скалярное</span>
          <span class="op-formula">A × скаляр</span>
        </button>
        <button class="op-btn" data-op="lu">
          <span class="op-icon">∇</span>
          <span>Разложение</span>
          <span class="op-formula">LU(A)</span>
        </button>
      </div>
      <div class="calc-row">
        <button class="btn btn-calc" id="btn-calc">
          <span>Вычислить</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
    </section>

    <!-- Result -->
    <section class="card result-card">
      <div class="card-label">Результат</div>
      <div class="result-wrap">
        <div id="spinner" class="spinner hidden"></div>
        <div id="error-box" class="error-box hidden"></div>
        <pre id="result-output" class="result-output"><span class="placeholder">Результат появится здесь…</span></pre>
      </div>
    </section>

  </main>
</div>

<script src="app.js"></script>
</body>
</html>
